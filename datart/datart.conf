# ============================================================
# Datart 配置文件 — 对应讲稿第 16 课时
#
# 将此文件复制到 Datart 安装目录的 config/ 目录下：
#   cp datart/datart.conf ~/project/datart/config/datart.conf
#
# 然后启动 Datart：
#   cd ~/project/datart
#   ./bin/datart-server.sh start
# ============================================================

# ---- 数据源配置（Datart 自身存储）----
datasource.ip=localhost
datasource.port=3306
datasource.database=datart
datasource.username=datart
datasource.password=datart123

# ---- 服务配置 ----
server.port=8080
server.address=0.0.0.0

# ---- Datart 应用配置 ----
datart.address=http://127.0.0.1
datart.user.register=true
